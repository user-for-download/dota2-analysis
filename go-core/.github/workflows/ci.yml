name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test ./... -short -v

      - name: Contract tests
        if: ${{ secrets.POSTGRES_TEST_DSN != '' }}
        run: go test ./contracttest/ -v
        env:
          POSTGRES_TEST_DSN: ${{ secrets.POSTGRES_TEST_DSN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: vet
        run: go vet ./...
