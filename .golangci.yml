# ──────── golangci-lint configuration for dota2-analysis monorepo ────────
# Shared across all modules. Per-module overrides can go in module-level
# .golangci.yml files if needed.
# ──────────────────────────────────────────────────────────────────────────

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/user-for-download

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosimple

run:
  timeout: 5m
