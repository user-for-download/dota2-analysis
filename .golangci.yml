# See https://golangci-lint.run/usage/configuration/
run:
  timeout: 5m
  modules-download-mode: readonly
  allow-parallel-runners: true

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - revive
    - gocyclo
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - unused
    - usestdlibvars
  disable:
    - exhaustruct
    - varnamelen
    - nlreturn
    - wsl
    - testpackage

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  govet:
    enable:
      - stdversion
    disable:
      - fieldalignment
  revive:
    rules:
      - name: exported
        severity: warning
      - name: blank-imports
      - name: context-as-argument
      - name: error-return
      - name: error-strings
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: package-comments
  gocyclo:
    min-complexity: 20
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/user-for-download
  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - gocyclo
    - path: cmd/
      linters:
        - gosec
    - path: internal/proxy/transport
      linters:
        - gosec
    - source: "^//go:embed"
      linters:
        - lll
  max-issues-per-linter: 0
  max-same-issues: 0
