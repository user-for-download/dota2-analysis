name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GOFLAGS: -mod=vendor

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker buildx bake --file deploy/docker-bake.hcl --load \
            --set *.cache-from=type=gha \
            --set *.cache-to=type=gha,mode=max
