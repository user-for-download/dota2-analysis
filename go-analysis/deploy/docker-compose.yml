# ──────── CI / isolated-dev compose for the analysis pipeline ────────
# The canonical orchestration for full-stack development lives at:
#   dota2-analysis/docker-compose.yml  (root-level)
#
# This file is an *extension fragment* — include it from the root compose
# or use it standalone for CI / single-service development.
#
# Usage:
#   include:
#     - path: go-analysis/deploy/docker-compose.yml
#       project: dota2-analysis
#
# Build images first:
#   docker buildx bake -f deploy/docker-bake.hcl --load
#
# Profiles:
#   all       — api, featurizer, backtester
#   training  — trainer (one-shot)

x-common-env: &common-env
  APP_ENV: ${APP_ENV:-dev}
  LOG_LEVEL: ${LOG_LEVEL:-debug}

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:

  api:
    image: go-dota2-analysis-api:${TAG:-latest}
    container_name: dota2-analysis-api
    <<: *common
    profiles: [ all ]
    env_file: [ .env ]
    environment:
      <<: *common-env
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-dota2}:${POSTGRES_PASSWORD:-dota2}@postgres:5432/${POSTGRES_DB:-dota2}
      API_TOKEN: ${API_TOKEN:-changeme}
      API_BIND: 0.0.0.0:8080
      ANALYTICS_PATCH_ID: ${ANALYTICS_PATCH_ID:-72}
      ANALYTICS_SCORER_KIND: ${ANALYTICS_SCORER_KIND:-linear}
      ANALYTICS_MODEL_DIR: /models/imitation/current
      ANALYTICS_VALUE_MODEL_DIR: /models/value/current
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    ports:
      - "127.0.0.1:${ANALYSIS_API_PORT:-8080}:8080"
    volumes:
      - ./models:/models:ro
#    depends_on:
#      postgres:
#        condition: service_healthy
    networks: [ dota2-net ]

  featurizer:
    image: go-dota2-analysis-featurizer:${TAG:-latest}
    container_name: dota2-analysis-featurizer
    <<: *common
    profiles: [ all ]
    env_file: [ .env ]
    environment:
      <<: *common-env
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-dota2}:${POSTGRES_PASSWORD:-dota2}@postgres:5432/${POSTGRES_DB:-dota2}
      ANALYTICS_PATCH_ID: ${ANALYTICS_PATCH_ID:-72}
      ANALYTICS_FEATURIZER_INTERVAL: ${ANALYTICS_FEATURIZER_INTERVAL:-24h}
#    depends_on:
#      postgres:
#        condition: service_healthy
    networks: [ dota2-net ]

  backtester:
    image: go-dota2-analysis-backtester:${TAG:-latest}
    container_name: dota2-analysis-backtester
    profiles: [ all ]
    restart: "no"
    env_file: [ .env ]
    environment:
      <<: *common-env
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-dota2}:${POSTGRES_PASSWORD:-dota2}@postgres:5432/${POSTGRES_DB:-dota2}
      ANALYTICS_PATCH_ID: ${ANALYTICS_PATCH_ID:-72}
      ANALYTICS_SCORER_KIND: ${ANALYTICS_SCORER_KIND:-linear}
      ANALYTICS_MODEL_DIR: /models/imitation/current
      BACKTEST_PATCH_ID: ${BACKTEST_PATCH_ID:-}
    volumes:
      - ./models:/models:ro
#    depends_on:
#      postgres:
#        condition: service_healthy
    networks: [ dota2-net ]

  trainer:
    build:
      context: ../training
      dockerfile: Dockerfile
    container_name: dota2-analysis-trainer
    profiles: [ training ]
    restart: "no"
    env_file: [ .env ]
    environment:
      <<: *common-env
      TRAINER_POSTGRES_DSN: postgresql://${POSTGRES_USER:-dota2}:${POSTGRES_PASSWORD:-dota2}@postgres:5432/${POSTGRES_DB:-dota2}
      TRAINER_PATCH_ID: ${ANALYTICS_PATCH_ID:-72}
      TRAINER_ARTIFACT_DIR: /app/artifacts
      TRAINER_MODEL_DIR: /models
    volumes:
      - ./models:/models
      - trainer-artifacts:/app/artifacts
#    depends_on:
#      postgres:
#        condition: service_healthy
    networks: [ dota2-net ]

volumes:
  trainer-artifacts:

networks:
  dota2-net:
    external: true
    name: go-dota2_dota2-net
